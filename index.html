<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoAgent Demo - AI Destekli Coğrafi Analiz</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .map-container {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        #map {
            height: 700px;
            width: 100%;
        }

        .control-group {
            margin-bottom: 24px;
        }

        .control-group h3 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #667eea;
            margin-bottom: 12px;
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .stat-card {
            background: #f9fafb;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .legend {
            background: white;
            padding: 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            max-width: 200px;
        }

        .legend h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-info {
            background: #dbeafe;
            color: #1e40af;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                order: 2;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🗺️ GeoAgent Demo</h1>
            <p class="subtitle">Yapay Zeka Destekli İnteraktif Harita ve Coğrafi Analiz Platformu</p>
            <div style="margin-top: 12px;">
                <span class="badge badge-success">✓ Canlı</span>
                <span class="badge badge-info">AI Destekli</span>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="control-group">
                    <h3>📍 Önemli Noktalar</h3>
                    <button class="btn btn-primary" onclick="addTaksim()">
                        🏛️ Taksim Meydanı
                    </button>
                    <button class="btn btn-primary" onclick="addGalatasaray()">
                        ⚽ Galatasaray Stadı
                    </button>
                    <button class="btn btn-primary" onclick="addBogazKoprusu()">
                        🌉 Boğaz Köprüsü
                    </button>
                    <button class="btn btn-primary" onclick="addSultanahmet()">
                        🕌 Sultanahmet
                    </button>
                </div>

                <div class="control-group">
                    <h3>🔍 Analiz Araçları</h3>
                    <button class="btn btn-secondary" onclick="showMetroBuffer()">
                        🚇 Metro İstasyonları (500m)
                    </button>
                    <button class="btn btn-secondary" onclick="showParks()">
                        🌳 Yeşil Alanlar
                    </button>
                    <button class="btn btn-secondary" onclick="showTraffic()">
                        🚗 Trafik Yoğunluğu
                    </button>
                </div>

                <div class="control-group">
                    <h3>🎨 Harita Görünümü</h3>
                    <button class="btn btn-secondary" onclick="changeBasemap('streets')">
                        🗺️ Sokak Haritası
                    </button>
                    <button class="btn btn-secondary" onclick="changeBasemap('satellite')">
                        🛰️ Uydu Görünümü
                    </button>
                    <button class="btn btn-secondary" onclick="changeBasemap('dark')">
                        🌙 Karanlık Mod
                    </button>
                </div>

                <div class="control-group">
                    <h3>📊 İstatistikler</h3>
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-value" id="markerCount">0</div>
                            <div class="stat-label">Marker</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="layerCount">1</div>
                            <div class="stat-label">Katman</div>
                        </div>
                    </div>
                </div>
            </aside>

            <div class="map-container">
                <div id="map"></div>
                
                <div class="legend">
                    <h4>Katman Açıklaması</h4>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #ef4444;"></div>
                        <span>Önemli Noktalar</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #3b82f6;"></div>
                        <span>Metro Buffer (500m)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #10b981;"></div>
                        <span>Yeşil Alanlar</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Harita başlat
        const map = L.map('map').setView([41.0082, 28.9784], 11);
        
        // Basemap katmanları
        const basemaps = {
            streets: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '© Esri'
            }),
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© CartoDB'
            })
        };
        
        basemaps.streets.addTo(map);
        
        let markerCount = 0;
        let layerCount = 1;
        const markers = [];
        
        function updateStats() {
            document.getElementById('markerCount').textContent = markerCount;
            document.getElementById('layerCount').textContent = layerCount;
        }
        
        function addMarker(lat, lng, title, icon = '📍') {
            const marker = L.marker([lat, lng]).addTo(map);
            marker.bindPopup(`<b>${icon} ${title}</b><br>Lat: ${lat}<br>Lng: ${lng}`);
            markers.push(marker);
            markerCount++;
            updateStats();
            map.setView([lat, lng], 13);
        }
        
        function addTaksim() {
            addMarker(41.0369, 28.9850, 'Taksim Meydanı', '🏛️');
        }
        
        function addGalatasaray() {
            addMarker(41.1039, 28.9906, 'Galatasaray Stadı', '⚽');
        }
        
        function addBogazKoprusu() {
            addMarker(41.0408, 29.0055, 'Boğaz Köprüsü', '🌉');
        }
        
        function addSultanahmet() {
            addMarker(41.0086, 28.9802, 'Sultanahmet Camii', '🕌');
        }
        
        function showMetroBuffer() {
            // Metro istasyonları ve 500m buffer
            const metroStations = [
                [41.0369, 28.9850], // Taksim
                [41.0082, 28.9784], // Şişhane
                [41.0255, 28.9744], // Osmanbey
            ];
            
            metroStations.forEach(coord => {
                L.circle(coord, {
                    color: '#3b82f6',
                    fillColor: '#3b82f6',
                    fillOpacity: 0.2,
                    radius: 500
                }).addTo(map).bindPopup('Metro İstasyonu - 500m Buffer');
            });
            
            layerCount += metroStations.length;
            updateStats();
        }
        
        function showParks() {
            // Örnek yeşil alanlar
            const parks = [
                [[41.0408, 28.9790], [41.0420, 28.9810], [41.0410, 28.9820], [41.0398, 28.9800]],
            ];
            
            parks.forEach(coords => {
                L.polygon(coords, {
                    color: '#10b981',
                    fillColor: '#10b981',
                    fillOpacity: 0.3
                }).addTo(map).bindPopup('Yeşil Alan / Park');
            });
            
            layerCount++;
            updateStats();
        }
        
        function showTraffic() {
            alert('🚗 Trafik katmanı: Gerçek zamanlı trafik verileri için API entegrasyonu gerekiyor.');
        }
        
        function changeBasemap(type) {
            // Mevcut basemap'i kaldır
            Object.values(basemaps).forEach(layer => map.removeLayer(layer));
            // Yeni basemap'i ekle
            basemaps[type].addTo(map);
        }
        
        // İlk marker'ı ekle
        addTaksim();
    </script>
</body>
</html>
