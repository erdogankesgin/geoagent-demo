<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoAgent Demo - AI Destekli Coğrafi Analiz</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e27;
            color: #e4e4e7;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: linear-gradient(180deg, #1a1d35 0%, #0f1123 100%);
            border-right: 1px solid #2d3250;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid #2d3250;
        }

        .sidebar-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 13px;
            color: #9ca3af;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
            margin-right: 6px;
        }

        .badge-success {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .badge-info {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .sidebar-content {
            flex: 1;
            padding: 20px;
        }

        .control-section {
            margin-bottom: 28px;
        }

        .control-section h3 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #6366f1;
            margin-bottom: 14px;
        }

        /* Layer Control */
        .layer-item {
            background: rgba(45, 50, 80, 0.4);
            border: 1px solid #2d3250;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }

        .layer-item:hover {
            background: rgba(45, 50, 80, 0.6);
            border-color: #3d4270;
        }

        .layer-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .layer-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #6366f1;
        }

        .layer-label {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: #e4e4e7;
            cursor: pointer;
        }

        .layer-icon {
            font-size: 18px;
        }

        /* Opacity Slider */
        .opacity-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .opacity-label {
            font-size: 11px;
            color: #9ca3af;
            min-width: 60px;
        }

        .opacity-slider {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: #2d3250;
            outline: none;
            -webkit-appearance: none;
        }

        .opacity-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
        }

        .opacity-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            border: none;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: rgba(45, 50, 80, 0.6);
            color: #e4e4e7;
            border: 1px solid #2d3250;
        }

        .btn-secondary:hover {
            background: rgba(45, 50, 80, 0.8);
            border-color: #3d4270;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px;
        }

        .stat-card {
            background: rgba(45, 50, 80, 0.4);
            border: 1px solid #2d3250;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #6366f1;
        }

        .stat-label {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 4px;
        }

        /* Map Container */
        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Legend */
        .legend {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(26, 29, 53, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #2d3250;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            max-width: 220px;
            z-index: 1000;
        }

        .legend h4 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #fff;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #e4e4e7;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Mobile Toggle */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2000;
            background: rgba(26, 29, 53, 0.95);
            border: 1px solid #2d3250;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            color: #fff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                z-index: 1500;
                transform: translateX(-100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .mobile-toggle {
                display: block;
            }

            .legend {
                bottom: 80px;
                right: 12px;
                max-width: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>🗺️ GeoAgent Demo</h1>
                <p>Yapay Zeka Destekli İnteraktif Harita</p>
                <div>
                    <span class="badge badge-success">✓ Canlı</span>
                    <span class="badge badge-info">AI Destekli</span>
                </div>
            </div>

            <div class="sidebar-content">
                <!-- Katman Kontrolü -->
                <div class="control-section">
                    <h3>🗺️ Katmanlar</h3>
                    
                    <div class="layer-item">
                        <div class="layer-header">
                            <input type="checkbox" class="layer-checkbox" id="layer-sentinel" onchange="toggleLayer('sentinel')">
                            <label class="layer-label" for="layer-sentinel">
                                <span class="layer-icon">🛰️</span> Sentinel-2 (AWS)
                            </label>
                        </div>
                        <div class="opacity-control">
                            <span class="opacity-label">Şeffaflık</span>
                            <input type="range" class="opacity-slider" min="0" max="100" value="90" 
                                   oninput="updateOpacity('sentinel', this.value)">
                            <span class="opacity-label" id="opacity-sentinel">90%</span>
                        </div>
                    </div>

                    <div class="layer-item">
                        <div class="layer-header">
                            <input type="checkbox" class="layer-checkbox" id="layer-metro" onchange="toggleLayer('metro')">
                            <label class="layer-label" for="layer-metro">
                                <span class="layer-icon">🚇</span> Metro Buffer (500m)
                            </label>
                        </div>
                        <div class="opacity-control">
                            <span class="opacity-label">Şeffaflık</span>
                            <input type="range" class="opacity-slider" min="0" max="100" value="40" 
                                   oninput="updateOpacity('metro', this.value)">
                            <span class="opacity-label" id="opacity-metro">40%</span>
                        </div>
                    </div>

                    <div class="layer-item">
                        <div class="layer-header">
                            <input type="checkbox" class="layer-checkbox" id="layer-parks" onchange="toggleLayer('parks')">
                            <label class="layer-label" for="layer-parks">
                                <span class="layer-icon">🌳</span> Yeşil Alanlar
                            </label>
                        </div>
                        <div class="opacity-control">
                            <span class="opacity-label">Şeffaflık</span>
                            <input type="range" class="opacity-slider" min="0" max="100" value="50" 
                                   oninput="updateOpacity('parks', this.value)">
                            <span class="opacity-label" id="opacity-parks">50%</span>
                        </div>
                    </div>
                </div>

                <!-- Önemli Noktalar -->
                <div class="control-section">
                    <h3>📍 Önemli Noktalar</h3>
                    <button class="btn btn-secondary" onclick="addTaksim()">
                        🏛️ Taksim Meydanı
                    </button>
                    <button class="btn btn-secondary" onclick="addGalatasaray()">
                        ⚽ Galatasaray Stadı
                    </button>
                    <button class="btn btn-secondary" onclick="addBogazKoprusu()">
                        🌉 Boğaz Köprüsü
                    </button>
                    <button class="btn btn-secondary" onclick="addSultanahmet()">
                        🕌 Sultanahmet
                    </button>
                </div>

                <!-- Harita Görünümü -->
                <div class="control-section">
                    <h3>🎨 Harita Stili</h3>
                    <button class="btn btn-secondary" onclick="changeBasemap('streets')">
                        🗺️ Sokak Haritası
                    </button>
                    <button class="btn btn-secondary" onclick="changeBasemap('satellite')">
                        🛰️ Uydu Görünümü
                    </button>
                    <button class="btn btn-secondary" onclick="changeBasemap('dark')">
                        🌙 Karanlık Mod
                    </button>
                </div>

                <!-- İstatistikler -->
                <div class="control-section">
                    <h3>📊 İstatistikler</h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="markerCount">0</div>
                            <div class="stat-label">Marker</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="layerCount">1</div>
                            <div class="stat-label">Katman</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Map -->
        <div class="map-container">
            <div id="map"></div>
            
            <div class="legend">
                <h4>Katman Açıklaması</h4>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ef4444;"></div>
                    <span>Önemli Noktalar</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #3b82f6;"></div>
                    <span>Metro Buffer</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #10b981;"></div>
                    <span>Yeşil Alanlar</span>
                </div>
            </div>
        </div>

        <!-- Mobile Toggle -->
        <div class="mobile-toggle" onclick="toggleSidebar()">
            ☰
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Harita başlat
        const map = L.map('map').setView([41.0082, 28.9784], 11);
        
        // Basemap katmanları
        const basemaps = {
            streets: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '© Esri'
            }),
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© CartoDB'
            })
        };
        
        basemaps.streets.addTo(map);
        
        // Layer storage
        const layers = {
            sentinel: null,
            metro: [],
            parks: []
        };
        
        let markerCount = 0;
        let layerCount = 1;
        const markers = [];
        
        function updateStats() {
            document.getElementById('markerCount').textContent = markerCount;
            document.getElementById('layerCount').textContent = layerCount;
        }
        
        function toggleLayer(layerName) {
            const checkbox = document.getElementById(`layer-${layerName}`);
            
            if (checkbox.checked) {
                if (layerName === 'sentinel') {
                    showSentinel2();
                } else if (layerName === 'metro') {
                    showMetroBuffer();
                } else if (layerName === 'parks') {
                    showParks();
                }
            } else {
                if (layerName === 'sentinel' && layers.sentinel) {
                    map.removeLayer(layers.sentinel);
                    layers.sentinel = null;
                } else if (layerName === 'metro') {
                    layers.metro.forEach(l => map.removeLayer(l));
                    layers.metro = [];
                } else if (layerName === 'parks') {
                    layers.parks.forEach(l => map.removeLayer(l));
                    layers.parks = [];
                }
                layerCount--;
                updateStats();
            }
        }
        
        function updateOpacity(layerName, value) {
            const opacity = value / 100;
            document.getElementById(`opacity-${layerName}`).textContent = value + '%';
            
            if (layerName === 'sentinel' && layers.sentinel) {
                layers.sentinel.setOpacity(opacity);
            } else if (layerName === 'metro') {
                layers.metro.forEach(l => l.setStyle({ fillOpacity: opacity * 0.2, opacity: opacity }));
            } else if (layerName === 'parks') {
                layers.parks.forEach(l => l.setStyle({ fillOpacity: opacity * 0.3, opacity: opacity }));
            }
        }
        
        function showSentinel2() {
            if (layers.sentinel) return;
            
            layers.sentinel = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '© Esri - Sentinel-2 (2024-09-25)',
                opacity: 0.9
            }).addTo(map);
            
            layerCount++;
            updateStats();
        }
        
        function showMetroBuffer() {
            if (layers.metro.length > 0) return;
            
            const metroStations = [
                [41.0369, 28.9850],
                [41.0082, 28.9784],
                [41.0255, 28.9744],
            ];
            
            metroStations.forEach(coord => {
                const circle = L.circle(coord, {
                    color: '#3b82f6',
                    fillColor: '#3b82f6',
                    fillOpacity: 0.2,
                    radius: 500
                }).addTo(map).bindPopup('Metro İstasyonu - 500m Buffer');
                
                layers.metro.push(circle);
            });
            
            layerCount++;
            updateStats();
        }
        
        function showParks() {
            if (layers.parks.length > 0) return;
            
            const parks = [
                [[41.0408, 28.9790], [41.0420, 28.9810], [41.0410, 28.9820], [41.0398, 28.9800]],
            ];
            
            parks.forEach(coords => {
                const polygon = L.polygon(coords, {
                    color: '#10b981',
                    fillColor: '#10b981',
                    fillOpacity: 0.3
                }).addTo(map).bindPopup('Yeşil Alan / Park');
                
                layers.parks.push(polygon);
            });
            
            layerCount++;
            updateStats();
        }
        
        function addMarker(lat, lng, title, icon = '📍') {
            const marker = L.marker([lat, lng]).addTo(map);
            marker.bindPopup(`<b>${icon} ${title}</b><br>Lat: ${lat}<br>Lng: ${lng}`);
            markers.push(marker);
            markerCount++;
            updateStats();
            map.setView([lat, lng], 13);
        }
        
        function addTaksim() {
            addMarker(41.0369, 28.9850, 'Taksim Meydanı', '🏛️');
        }
        
        function addGalatasaray() {
            addMarker(41.1039, 28.9906, 'Galatasaray Stadı', '⚽');
        }
        
        function addBogazKoprusu() {
            addMarker(41.0408, 29.0055, 'Boğaz Köprüsü', '🌉');
        }
        
        function addSultanahmet() {
            addMarker(41.0086, 28.9802, 'Sultanahmet Camii', '🕌');
        }
        
        function changeBasemap(type) {
            Object.values(basemaps).forEach(layer => map.removeLayer(layer));
            basemaps[type].addTo(map);
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
        
        // İlk marker
        addTaksim();
    </script>
</body>
</html>
